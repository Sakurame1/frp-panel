name: Master Release
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: npm setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24.x"
      - name: npm install and build
        run: |
          cd www
          npm install -g pnpm
      - name: Install dependencies
        run: |
          go mod download
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
      - name: Compile server
        run: bash ./build.sh
      - name: Verify embedded frontend assets
        run: test -d cmd/frpp/out && find cmd/frpp/out -type f | grep -q .
      - uses: "marvinpinto/action-automatic-releases@latest"
        if: github.event_name != 'pull_request'
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: true
          automatic_release_tag: alpha
          files: |
            dist/*
      - name: Setup ko
        if: github.event_name != 'pull_request'
        uses: ko-build/setup-ko@v0.9
        env:
          KO_DOCKER_REPO: docker.io/sakurame1/frp-panel
      - env:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        if: github.event_name != 'pull_request'
        run: |
          echo "${password}" | ko login docker.io --username ${username} --password-stdin
          ko build ./cmd/frpp --sbom=none --bare -t alpha
